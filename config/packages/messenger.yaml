framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000       # ms before first retry
                    multiplier: 2     # each retry waits 2× longer (1s → 2s → 4s)
                    max_delay: 0      # 0 = no cap

            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Message\OrderCreatedMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
